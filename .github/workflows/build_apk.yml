name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4

      - name: 🐍 تثبيت Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: 🔧 تثبيت الأدوات الأساسية و Buildozer
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool
          pip install --upgrade Cython==0.29.33
          pip install buildozer

      - name: 📱 إعداد Android SDK و NDK يدويًا
        run: |
          # تحميل أدوات سطر الأوامر إذا لم تكن موجودة
          if [ ! -d "$HOME/android-sdk/cmdline-tools/latest" ]; then
            mkdir -p $HOME/android-sdk/cmdline-tools
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip
            unzip -q commandlinetools-linux-12266719_latest.zip -d $HOME/android-sdk/cmdline-tools
            mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          fi
          # تعيين متغيرات البيئة
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.2.8568313
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          # قبول التراخيص
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null || true
          # تثبيت المكونات المطلوبة
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-31" \
            "build-tools;30.0.3" \
            "ndk;23.2.8568313"

      - name: 🔗 إعداد متغيرات Buildozer
        run: |
          echo "ANDROIDSDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROIDNDK=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "ANDROIDAPI=31" >> $GITHUB_ENV
          echo "ANDROIDMINAPI=21" >> $GITHUB_ENV

      - name: 🚀 بناء الـ APK
        run: |
          buildozer android debug

      - name: 📦 رفع الـ APK كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TreeReporter-APK
          path: bin/*.apk
